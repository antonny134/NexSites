<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexSites</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: #2a2a2a;
        }
        .logo{
            background: #666;
            display: flex;
            gap: 5px;
            justify-content: space-between;
            font-size: 19px;
            padding: 15px;
            border-bottom: 2px solid lime;
            color: white;
        }
        .logo1{
            display: flex;
            gap: 5px;
        }
        .logo a{
            color: black;
            text-decoration: none;
        }
        .catalogo{
            display: flex;
            gap: 18px;
        }
        .logo a:hover{
            border-bottom: 2px solid #00f700;
            transition: all 0.4s;
        }
        .logo a:active{
            color: #ccc;
        }
        .logo a:focus{
            border-bottom: 3px solid #00f700;
            transition: all 0.4s;
        }
        .s1{
            color: #00f700;
        }
        
        /* Tela2 */
        .tela2{
            display: flex;
            justify-content: center;
        }
        .pts{
            margin-top: 100px;
            text-align: center;
            background: #ccc;
            width: 450px;
            height: 400px;
            border-radius: 25px;
            border: 1px solid black;
        }
        .logo2{
            padding: 16px;
            border-bottom: 1px solid black;
        }
        .ps{
            margin-top: 15px;
        }
        .ps input{
            width: 250px;
            padding: 15px;
            border: 1px solid #00f700;
            border-radius: 10px;
        }
        .ps textarea{
            padding: 16px;
            margin-top: 15px;
            border-radius: 5px;
        }
        .ps button
        {
            padding: 9px;
            border-radius: 8px;
            font-size: 19px;
            cursor: pointer;
        }
        .ps button:hover{
            border: 2px solid #2a2a2a;
        }
        .ps button:active{
            background: #ccc;
        }
        .ps label{
            font-size: 19px
        }
        /* Tela */
       .resultado{
        color: #ccc;
        padding: 15px;
        border-bottom: 1px solid #ccc;
       }
       .resultado a{
        color: blue;
        text-decoration: none;
        cursor: pointer;
       }
       .resultado a:hover{
         border-bottom: 1px solid blue;
       }

       /* Footer */
       footer{
        margin-top: 90px;
        padding: 15px;
        border-top: 2px solid #00f700;
        color: white;
        font-size: 17px;
       }
    </style>
</head>
<body>
    <!-- Logo -->
    <nav class="logo">
     <div class="logo1">
        <h3 class="s1">Nex</h3>
        <h3 class="s2">Sites</h3>
        <!-- Catalogo -->
    </div>
      <div class="catalogo">
            <a href="#" id="home">
                <span>Home</span>
            </a>
            <a href="#" id="criar">
                <span>Criar</span>
            </a>
            <a href="#" id="procurar">
                <span>Procurar</span>
            </a>
            <a href="#" id="meusites">
                <span>Meus Sites</span>
            </a>
         </div>
    </nav>
    <!-- Tela -->
     <nav id="tela"></nav>
     <script src="java.js"></script>
    <!-- Footer -->
     <footer id="footer">
        <p>© 2026 NexSites. Todos os direitos reservados.</p>
     </footer>
</body>
</html>
