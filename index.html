<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexSites</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
        background: #2a2a2a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
        #tela{
       flex: 1;
       }
        .logo{
            background: #666;
            display: flex;
            justify-content: space-between;
            font-size: 19px;
            padding: 15px;
            border-bottom: 2px solid lime;
            color: white;
        }
        .logo1{
            display: flex;
            gap: 5px;
        }
        .logo a{
            color: #fff;
            text-decoration: none;
        }
        .logo a:hover{
            border-bottom: 2px solid #00f700;
            transition: all 0.4s;
        }
        .logo a:active{
            color: #ccc;
        }
        .logo a:focus{
            border-bottom: 3px solid #00f700;
            transition: all 0.4s;
        }
        .s1{
            color: #00f700;
        }
        
        /* Tela2 */
        .tela2{
            display: flex;
            justify-content: center;
        }
        .pts{
            margin-top: 100px;
            text-align: center;
            background: #ccc;
            width: 450px;
            height: 400px;
            border-radius: 25px;
            border: 1px solid black;
        }
        .logo2{
            padding: 16px;
            border-bottom: 1px solid #000;
        }
        .ps{
            margin-top: 15px;
        }
        .ps input{
            width: 250px;
            padding: 15px;
            border: 1px solid #00f700;
            border-radius: 10px;
        }
        .ps textarea{
            padding: 16px;
            margin-top: 15px;
            border-radius: 5px;
        }
        .ps button
        {
            padding: 9px;
            border-radius: 8px;
            font-size: 19px;
            cursor: pointer;
        }
        .ps button:hover{
            border: 2px solid #2a2a2a;
        }
        .ps button:active{
            background: #ccc;
        }
        .ps label{
            font-size: 19px
        }
        /* Tela */
       .resultado{
        border-bottom: 1px solid #ccc;
       }

       /* Footer */
       footer{
        margin-top: 90px;
        padding: 15px;
        border-top: 2px solid #00f700;
        color: white;
        font-size: 17px;
        z-index: 1000;
        background: #000;
       }

       /* Procurar */
       .procurar{
        display: flex;
        justify-content: center;
        margin-top: 15px;
        align-items: center;
       }
       .procurar input{
        padding: 10px;
        border-radius: 22px;
        width: 450px;
        border: 2px solid #666;
       }
       .procurar ::placeholder{
        font-size: 18px;
       }
       .procurar i{
        color: black;
        margin-left: 15px;
        font-size: 25px;
        cursor: pointer;
        background: #fff;
        padding: 5px 5px;
        border-radius: 100px;
       }
       .procurar i:hover{
        color: #1dbf1d;
       }

       /* home */
       .home{
        padding: 10px;
        color: #1dbf1d;
        position: fixed;
       }

       /* User status */
       .user-status{
        color: #1dbf1d;
        font-size: 14px;
        margin-right: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
       }
       .user-status #logoutBtn{
        background: #d9534f;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
       }
       .user-status #logoutBtn:hover{
        background: #c9423f;
       }

       /* catalogo */
       .catalogo{
        border: 1px solid #ccc;
        border-radius: 22px;
        padding: 0px 7px;
        display: flex;
        gap: 18px;
        background: rgba(0, 0, 0, 0.271);
       }
       .catalogo:hover{
        padding: 0px 10px;
        transition: all 0.9s;
        border-bottom: #000;
        border: 1px solid #1dbf1d;
       }
       .catalogo a:hover{
        border-bottom: 2px solid #ccc;
       }

       /* Produto */
       .product-card{
        margin-top: 10px;
        gap: 10px;
        border: 2px solid black;
        border-radius: 10px;
        color: #ccc;
        padding: 15px;
       }
       .product-card h2{
        color: #1dbf1d;
        
       }
       .product-card a{
        color: blue;
        text-decoration: none;
        cursor: pointer;
       }
       .product-card a:hover{
         border-bottom: 1px solid blue;
       }
       .product-card:hover{
        border: 2px solid #1dbf1d;
        transition: all 0.6s;
       }

       /* sites populares */
       .sites{
        margin-top: 10px;
        gap: 10px;
        border: 2px solid black;
        border-radius: 10px;
        color: #ccc;
        padding: 15px;
       }
       .sites h2{
        color: #1dbf1d;
       }
       .sites a{
        color: blue;
        text-decoration: none;
        cursor: pointer;
       }
       .sites a:hover{
         border-bottom: 1px solid blue;
       }
    </style>
</head>
<body>
    <!-- Logo -->
    <nav class="logo">
     <div class="logo1">
        <h3 class="s1">Nex</h3>
        <h3 class="s2">Sites</h3>
        <!-- Catalogo -->
    </div>
      <div class="catalogo">
            <a href="" id="home">
                <span>Home</span>
            </a>
            <a href="#" id="criar">
                <span>Criar</span>
            </a>
            <a href="#" id="cadastro">
                <span>Cadastro</span>
            </a>
            <a href="#" id="loginBtn">
                <span>Login</span>
            </a>
            <a href="#" id="procurar">
                <span>Procurar</span>
            </a>
            <a href="#" id="meusites">
                <span>Meus Sites</span>
            </a>
         </div>
    </nav>
    <!-- Tela -->
     <nav id="tela">
        <nav class="home" id="home2">
            <!-- Home -->
             <h3>Sites Populares</h3>
             <!-- Sites -->
              <nav class="sites" id="sites"></nav>
        </nav>
     </nav>
     <script src="java.js"></script>
    <!-- Footer -->
     <footer id="footer">
        <p>© 2026 NexSites. Todos os direitos reservados.</p>
     </footer>
</body>
</html>
